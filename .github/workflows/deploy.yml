name: Deploy Bot Factory

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx biome check .
      - name: Type Check
        run: npx tsc --noEmit
      - name: Run Tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set Cloudflare Secrets
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: |
            secret put GEMINI_API_KEY --json '{"value": "${{ secrets.GEMINI_API_KEY }}"}'
            secret put TITANIUM_API_SECRET --json '{"value": "${{ secrets.TITANIUM_API_SECRET }}"}'
            secret put MIGRATION_KEY --json '{"value": "${{ secrets.MIGRATION_KEY }}"}'
            secret put TELEGRAM_BOT_TOKEN --json '{"value": "${{ secrets.TELEGRAM_BOT_TOKEN }}"}'
            secret put ADMIN_TELEGRAM_IDS --json '{"value": "${{ secrets.ADMIN_TELEGRAM_IDS }}"}'
      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply bot_factory_db --remote
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}